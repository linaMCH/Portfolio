<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code en Maintenance - Cinely</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .maintenance-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #D4C9D0; /* Ton mauve fétiche */
            text-align: center;
            padding: 40px;
            font-family: 'Poppins', sans-serif;
        }
        .icon-box { font-size: 4rem; color: #4A4448; margin-bottom: 20px; }
        h1 { color: #4A4448; font-size: 1.8rem; margin-bottom: 10px; }
        p { color: #5E565B; max-width: 500px; line-height: 1.6; margin-bottom: 30px; }
        .back-link {
            padding: 10px 25px;
            border: 2px solid #4A4448;
            color: #4A4448;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: 0.3s;
        }
        .back-link:hover { background: #4A4448; color: white; }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="icon-box"><i class="fa-solid fa-code-compare"></i></div>
        <h1>Dépôt en cours de reconstruction</h1>
        <p>Le code source de <strong>Cinely</strong> est actuellement en cours de réorganisation suite à une migration de serveur. Le rapport technique reste disponible pour consultation.</p>
        <a href="index.html" class="back-link">Retour au Portfolio</a>
    </div>
</body>
</html>
