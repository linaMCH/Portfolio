<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Non Trouvée | Lina Maouche</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .error-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 0 8%;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: clamp(5rem, 15vw, 8rem);
            color: var(--accent-color);
            margin: 0;
            line-height: 1;
        }

        .error-msg {
            font-size: var(--font-size-sub);
            color: var(--text-muted);
            max-width: 500px;
            margin: 20px 0 40px;
            line-height: 1.6;
        }

        /* Réutilisation du style de ton bouton CV pour la cohérence */
        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 25px;
            background-color: transparent;
            border: 1px solid var(--accent-color);
            border-radius: 20px;
            color: var(--text-main);
            text-decoration: none;
            font-size: var(--font-size-nav);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-home:hover {
            background-color: var(--accent-color);
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <script>
        if (localStorage.getItem('dark-mode') === 'enabled') {
            document.body.classList.add('dark-mode');
        }
    </script>

    <div class="error-wrapper">
        <h1 class="error-code">404</h1>
        <h2 style="font-family: 'Playfair Display', serif;">Oups ! Page introuvable.</h2>
        
        <div class="error-msg">
            <p>La page que vous recherchez n'existe pas ou a été déplacée.</p>
            <p><em>The page you are looking for doesn't exist or has been moved.</em></p>
        </div>

        <a href="index.html" class="back-home">
            <i class="fas fa-arrow-left"></i> Retour à l'accueil / Back to Home
        </a>
    </div>

</body>
</html>
