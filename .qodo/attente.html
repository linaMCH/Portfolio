<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document en cours - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #D4C9D0; /* Ton mauve */
            text-align: center;
            padding: 20px;
            font-family: 'Poppins', sans-serif;
        }
        .error-icon { font-size: 5rem; color: #4A4448; margin-bottom: 20px; }
        h1 { color: #4A4448; font-size: 1.8rem; margin-bottom: 15px; }
        p { color: #5E565B; max-width: 600px; line-height: 1.6; margin-bottom: 30px; font-size: 1.1rem; }
        .btn-home {
            padding: 12px 30px;
            background: #4A4448;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            transition: 0.3s ease;
        }
        .btn-home:hover { background: #5E565B; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-icon"><i class="fa-solid fa-hourglass-half"></i></div>
        <h1>Contenu en cours de mise à jour</h1>
        <p>Ce document n'est pas encore disponible.</p>
        <a href="index.html" class="btn-home">Retour au portfolio</a>
    </div>
</body>
</html>
